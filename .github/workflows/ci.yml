name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Lint ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  # ─── Unit Tests ────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -race -v ./internal/... ./pkg/model/... ./pkg/blocker/... ./pkg/config/... ./pkg/unifi/...

  # ─── Protocol Tests ────────────────────────────────
  test-protocol:
    name: Protocol Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Download dependencies
        run: go mod download

      - name: Run protocol tests
        run: go test -race -v ./pkg/dns/... ./pkg/cache/...

  # ─── Build ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-protocol]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap (for CGo headers)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_SHA::8}"
          go build \
            -ldflags "-X github.com/phubbard/lantern/pkg/config.Version=$VERSION" \
            -o bin/lantern-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/lantern

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lantern-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/lantern-*

  # ─── Docker Integration Tests ──────────────────────
  test-docker:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t lantern:test .

      - name: Run DNS integration tests
        run: >
          docker compose -f docker-compose.test.yml
          up --build --abort-on-container-exit --exit-code-from test-dns
          lantern-server test-dns

      - name: Clean up DNS test
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Run DHCP integration tests
        run: >
          docker compose -f docker-compose.test.yml
          up --build --abort-on-container-exit --exit-code-from test-dhcp
          lantern-server test-dhcp

      - name: Clean up DHCP test
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ─── Coverage ──────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-unit, test-protocol]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Download dependencies
        run: go mod download

      - name: Generate coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          THRESHOLD=40
          echo "Total coverage: ${TOTAL}% (threshold: ${THRESHOLD}%)"
          if [ "$(echo "${TOTAL} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
