name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X github.com/phubbard/lantern/pkg/config.Version=${VERSION}" \
            -o lantern-${GOOS}-${GOARCH} \
            ./cmd/lantern

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lantern-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lantern-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lantern-linux-amd64/lantern-linux-amd64
            dist/lantern-linux-arm64/lantern-linux-arm64
